<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>VideoSynth WebGL</title>

<style>
html,body{
margin:0;
background:#000;
overflow:hidden;
height:100%;
font-family:sans-serif;
}

#wrap{
display:flex;
width:100vw;
height:100vh;
}

#view{
flex:1;
background:#000;
position:relative;
overflow:hidden;
}

canvas{
width:100%;
height:100%;
display:block;
}

#ui{
width:320px;
background:#111;
color:#fff;
overflow:auto;
padding:8px;
box-sizing:border-box;
border-left:1px solid #333;
}

.row{
display:grid;
grid-template-columns:110px 1fr 40px;
gap:4px;
margin:3px 0;
align-items:center;
}

input[type=range]{
width:100%;
}

button{
margin:2px;
padding:4px 8px;
background:#222;
color:#fff;
border:1px solid #444;
cursor:pointer;
}

button:hover{
background:#333;
}

h3{
margin:4px 0;
}

.small{
font-size:11px;
color:#aaa;
}
</style>
</head>

<body>

<div id="wrap">

<div id="view">
<canvas id="gl"></canvas>
</div>

<div id="ui">

<h3>VideoSynth</h3>

<div>
<button id="rand">Random</button>
<button id="png">PNG</button>
<button id="rec">Record</button>
<button id="full">Fullscreen</button>
</div>

<div class="small">
H hide UI<br>
F fullscreen<br>
R record<br>
P png<br>
A randomize
</div>

<div id="sliders"></div>

</div>

</div>

<script>

const PARAMS=[
["FreqX",6],
["FreqY",5],
["Patterns",8],
["Speed",50],
["Rotate",10],
["Zoom",40],
["Warp",30],
["Brightness",50],
["Contrast",50],
["ColorShift",0],
["Automation",40],
["Symmetry",4],
["Mirror",50],
["Noise",20],
["HueCycle",30],
["Saturation",50],
["Kaleido",8],
["XOffset",50],
["YOffset",50],
["Pulse",40]
];

const sliders=document.getElementById("sliders");
const vals={};

PARAMS.forEach(p=>{
let d=document.createElement("div");
d.className="row";

let lab=document.createElement("div");
lab.textContent=p[0];

let s=document.createElement("input");
s.type="range";
s.min=0;
s.max=100;
s.value=p[1];

let v=document.createElement("div");
v.textContent=p[1];

s.oninput=()=>{
vals[p[0]]=+s.value;
v.textContent=s.value;
};

vals[p[0]]=p[1];

d.append(lab,s,v);
sliders.append(d);
});

const canvas=document.getElementById("gl");

const gl=canvas.getContext("webgl");

if(!gl){
alert("WebGL not supported");
throw "";
}

function resize(){

canvas.width=1024;
canvas.height=768;

gl.viewport(
0,
0,
canvas.width,
canvas.height
);

}

window.addEventListener("resize",resize);
resize();

function shader(type,src){

let s=gl.createShader(type);

gl.shaderSource(s,src);

gl.compileShader(s);

if(!gl.getShaderParameter(s,gl.COMPILE_STATUS))
console.log(gl.getShaderInfoLog(s));

return s;
}

const VERT=`
attribute vec2 p;
void main(){
gl_Position=vec4(p,0.,1.);
}
`;

let recording=false;
let recorder;
let chunks=[];

function startRec(){

let stream=canvas.captureStream(60);

chunks=[];

recorder=new MediaRecorder(stream);

recorder.ondataavailable=e=>{
chunks.push(e.data);
};

recorder.onstop=()=>{

let blob=new Blob(
chunks,
{type:"video/webm"}
);

let a=document.createElement("a");

a.href=URL.createObjectURL(blob);

a.download="videosynth.webm";

a.click();

};

recorder.start();

recording=true;
}

function stopRec(){

if(recorder)
recorder.stop();

recording=false;
}

document.getElementById("rec").onclick=()=>{

if(recording)
stopRec();
else
startRec();

};

document.getElementById("png").onclick=()=>{

let a=document.createElement("a");

a.href=canvas.toDataURL();

a.download="frame.png";

a.click();

};

document.getElementById("full").onclick=()=>{

document.body.requestFullscreen?.();

};

document.getElementById("rand").onclick=()=>{

document
.querySelectorAll("input[type=range]")
.forEach(e=>{

e.value=Math.random()*100|0;

e.dispatchEvent(
new Event("input")
);

});

};
const FRAG=`

precision highp float;

uniform vec2 r;
uniform float t;

uniform float freqx;
uniform float freqy;
uniform float patterns;
uniform float speed;
uniform float rotatev;
uniform float zoomv;
uniform float warpv;
uniform float bright;
uniform float contrastv;
uniform float colorshift;
uniform float automation;
uniform float symmetry;
uniform float mirrorv;
uniform float noisev;
uniform float huecycle;
uniform float saturationv;
uniform float kaleido;
uniform float xoff;
uniform float yoff;
uniform float pulse;

float hash(vec2 p){
return fract(
sin(dot(p,vec2(127.1,311.7)))
*43758.5453
);
}

mat2 rot(float a){
float c=cos(a);
float s=sin(a);
return mat2(c,-s,s,c);
}

vec3 hsv(vec3 c){

vec4 K=vec4(
1.0,
2.0/3.0,
1.0/3.0,
3.0
);

vec3 p=
abs(
fract(c.xxx+K.xyz)*6.0-K.www
);

return c.z*
mix(
K.xxx,
clamp(p-K.xxx,0.0,1.0),
c.y
);

}

void main(){

vec2 uv=
(gl_FragCoord.xy/r.xy-.5)*2.;

uv.x*=r.x/r.y;

uv+=vec2(
(xoff-50.)*.02,
(yoff-50.)*.02
);

float tm=
t*(speed*.02+.05);

uv*=1.+
zoomv*.03;

uv*=rot(
tm*rotatev*.02
);

float k=max(
1.,
floor(kaleido*.2)+1.
);

float a=atan(
uv.y,
uv.x
);

float rr=length(uv);

a=
mod(
a,
6.28318/k
);

a=
abs(
a-3.14159/k
);

uv=
vec2(
cos(a),
sin(a)
)*rr;

float sym=
max(
1.,
floor(symmetry*.12)+1.
);

a=
atan(uv.y,uv.x);

rr=length(uv);

a=
floor(a*sym)/sym;

uv=
vec2(
cos(a),
sin(a)
)*rr;

if(mirrorv>50.)
uv.x=abs(uv.x);

float f=0.;

for(int i=1;i<16;i++){

float n=float(i);

if(n>patterns*.15+1.)
break;

vec2 p=uv;

p+=sin(
p.yx*n
+
tm*n*.5
)*warpv*.02;

f+=
sin(
p.x*n*(freqx*.05+.1)
+tm*n
);

f+=
cos(
p.y*n*(freqy*.05+.1)
-tm*n
);

}

f+=
(
hash(
uv*100.
+t
)-.5
)
*noisev*.2;

f+=
sin(
tm*3.
)
*pulse*.03;

float hue=
fract(
f*.08
+
colorshift*.01
+
tm*huecycle*.002
);

float sat=
saturationv*.01;

float val=
abs(
sin(f)
);

vec3 col=
hsv(
vec3(
hue,
sat,
val
)
);

col=
(col-.5)
*
(contrastv*.03+0.2)
+
.5;

col+=bright*.01;

col=
clamp(
col,
0.,
1.
);

gl_FragColor=
vec4(
col,
1.
);

}
`;

const prog=gl.createProgram();

gl.attachShader(
prog,
shader(
gl.VERTEX_SHADER,
VERT
)
);

gl.attachShader(
prog,
shader(
gl.FRAGMENT_SHADER,
FRAG
)
);

gl.linkProgram(prog);

gl.useProgram(prog);

const quad=
gl.createBuffer();

gl.bindBuffer(
gl.ARRAY_BUFFER,
quad
);

gl.bufferData(
gl.ARRAY_BUFFER,
new Float32Array([
-1,-1,
1,-1,
-1,1,
1,1
]),
gl.STATIC_DRAW
);

const pos=
gl.getAttribLocation(
prog,
"p"
);

gl.enableVertexAttribArray(pos);

gl.vertexAttribPointer(
pos,
2,
gl.FLOAT,
false,
0,
0
);

const U={};

[
"r",
"t",
"freqx",
"freqy",
"patterns",
"speed",
"rotatev",
"zoomv",
"warpv",
"bright",
"contrastv",
"colorshift",
"automation",
"symmetry",
"mirrorv",
"noisev",
"huecycle",
"saturationv",
"kaleido",
"xoff",
"yoff",
"pulse"
].forEach(n=>{

U[n]=
gl.getUniformLocation(
prog,
n
);

});

let t0=0;

function frame(ms){

if(!t0)t0=ms;

let time=(ms-t0)/1000;

gl.useProgram(prog);

gl.uniform2f(U.r,canvas.width,canvas.height);
gl.uniform1f(U.t,time);

for(let k in vals){

let v=vals[k];

switch(k){
case"FreqX":gl.uniform1f(U.freqx,v);break;
case"FreqY":gl.uniform1f(U.freqy,v);break;
case"Patterns":gl.uniform1f(U.patterns,v);break;
case"Speed":gl.uniform1f(U.speed,v);break;
case"Rotate":gl.uniform1f(U.rotatev,v);break;
case"Zoom":gl.uniform1f(U.zoomv,v);break;
case"Warp":gl.uniform1f(U.warpv,v);break;
case"Brightness":gl.uniform1f(U.bright,v);break;
case"Contrast":gl.uniform1f(U.contrastv,v);break;
case"ColorShift":gl.uniform1f(U.colorshift,v);break;
case"Automation":gl.uniform1f(U.automation,v);break;
case"Symmetry":gl.uniform1f(U.symmetry,v);break;
case"Mirror":gl.uniform1f(U.mirrorv,v);break;
case"Noise":gl.uniform1f(U.noisev,v);break;
case"HueCycle":gl.uniform1f(U.huecycle,v);break;
case"Saturation":gl.uniform1f(U.saturationv,v);break;
case"Kaleido":gl.uniform1f(U.kaleido,v);break;
case"XOffset":gl.uniform1f(U.xoff,v);break;
case"YOffset":gl.uniform1f(U.yoff,v);break;
case"Pulse":gl.uniform1f(U.pulse,v);break;
}
}

gl.drawArrays(gl.TRIANGLE_STRIP,0,4);

requestAnimationFrame(frame);
}

requestAnimationFrame(frame);

// keyboard controls

let ui=document.getElementById("ui");

window.addEventListener("keydown",e=>{

if(e.key==="h"||e.key==="H"){

ui.style.display=
ui.style.display==="none"
?"block":"none";

}

if(e.key==="f"||e.key==="F"){

document.body.requestFullscreen?.();

}

if(e.key==="p"||e.key==="P"){

let a=document.createElement("a");

a.href=canvas.toDataURL();

a.download="videosynth.png";

a.click();

}

if(e.key==="a"||e.key==="A"){

document
.querySelectorAll("input[type=range]")
.forEach(s=>{

s.value=Math.random()*100|0;

s.dispatchEvent(new Event("input"));

});

}

if(e.key==="r"||e.key==="R"){

document.getElementById("rec").click();

}

});

</script>

</body>
</html>
